<!DOCTYPE html>
<html>
<body>

<button onclick="launchGame()">Play Tung Sahur Horror</button>

<script>
function launchGame() {

  const url = "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/tungtung/";

  var win = window.open("about:blank","_blank");

  win.document.write(`
  <html>
  <head>
  <title>Tung Sahur Horror</title>
  <style>
  html,body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:black;
  overflow:hidden;
  }
  iframe{
  position:absolute;
  width:100%;
  height:100%;
  border:none;
  }
  </style>
  </head>
  <body>
  <iframe src="${url}"></iframe>
  </body>
  </html>
  `);

  win.document.close();
}
</script>

</body>
</html>
